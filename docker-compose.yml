# ============================================================
# 邮件发送平台 - Docker Compose 配置 (自定义端口版)
# 使用 .env 文件中的 NGINX_PORT 变量自定义访问端口
# 默认端口: 5200
# ============================================================
version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: email_platform_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: EmailPlatform2024!
      MYSQL_DATABASE: email_platform
      MYSQL_USER: email_user
      MYSQL_PASSWORD: EmailPlatform2024!
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - email_network

  # Redis 缓存
  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: email_platform_redis
    restart: always
    command: redis-server --requirepass EmailPlatformRedis2024!
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - email_network

  # Flask 应用
  app:
    build: .
    container_name: email_platform_app
    restart: always
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      DATABASE_URL: mysql+pymysql://email_user:EmailPlatform2024!@mysql:3306/email_platform?charset=utf8mb4
      REDIS_URL: redis://:EmailPlatformRedis2024!@redis:6379/0
      MAIL_DEFAULT_SENDER: noreply@example.com
      FLASK_ENV: production
    volumes:
      - ./logs:/app/logs
    ports:
      - "5000:5000"
    depends_on:
      - mysql
      - redis
    networks:
      - email_network

  # Nginx 反向代理
  nginx:
    image: docker.m.daocloud.io/library/nginx:alpine
    container_name: email_platform_nginx
    restart: always
    ports:
      - "${NGINX_PORT:-5200}:${NGINX_PORT:-5200}"
    environment:
      - NGINX_PORT=${NGINX_PORT:-5200}
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./static:/app/static
    depends_on:
      - app
    networks:
      - email_network
    command: /bin/sh -c "envsubst '\$NGINX_PORT' < /etc/nginx/conf.d/default.conf > /tmp/nginx.conf && cp /tmp/nginx.conf /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

volumes:
  mysql_data:
  redis_data:

networks:
  email_network:
    driver: bridge
