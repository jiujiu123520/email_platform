<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册账号 - 邮件发送平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 420px; padding: 40px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #667eea; font-size: 24px; margin-bottom: 8px; }
        .logo p { color: #888; font-size: 14px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; color: #333; font-weight: 500; font-size: 14px; }
        .form-group input { width: 100%; padding: 10px 14px; border: 2px solid #e1e1e1; border-radius: 8px; font-size: 14px; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .btn:hover { opacity: 0.9; }
        .back-link { display: block; text-align: center; margin-top: 16px; color: #667eea; text-decoration: none; font-size: 14px; }
        .alert { padding: 10px; border-radius: 6px; margin-bottom: 16px; display: none; }
        .alert.error { background: #fee; color: #c00; }
        .alert.success { background: #efe; color: #060; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>创建账号</h1>
            <p>加入邮件发送平台</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="registerForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" name="username" placeholder="设置用户名" required>
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="email" name="email" placeholder="输入邮箱地址" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" name="password" placeholder="设置密码" required>
            </div>
            <button type="submit" class="btn">立即注册</button>
        </form>

        <a href="index.html" class="back-link">返回登录</a>
    </div>

    <script>
        const API_BASE = '/api/v2';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const alert = document.getElementById('alert');

            btn.disabled = true;

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await res.json();

                if (data.code === 200) {
                    alert.className = 'alert success';
                    alert.textContent = '注册成功，请登录';
                    alert.style.display = 'block';
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    alert.className = 'alert error';
                    alert.textContent = data.message || '注册失败';
                    alert.style.display = 'block';
                }
            } catch (err) {
                alert.className = 'alert error';
                alert.textContent = '网络错误';
                alert.style.display = 'block';
            }

            btn.disabled = false;
        });
    </script>
</body>
</html>
